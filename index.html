<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayudante</title>

<style>
body{
    font-family:sans-serif;
    max-width:900px;
    margin:auto;
    padding:20px;
}

.formulario {
    display: flex;
    gap: 5px;
    margin-bottom: 15px;
}

input{
    font-size:20px;
    padding:8px;
    text-transform:uppercase;
}

#letras {
    width: 220px;
}

#extra {
    width: 50px;
    text-align: center;
}

button{
    font-size:20px;
    padding:8px 16px;
    cursor: pointer;
}

#estado{
    margin:10px 0;
    color:#666;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:6px;
}

th{
    background:#eee;
}

/* Estilo para los enlaces de las palabras */
td a {
    color: #0066cc;
    text-decoration: none;
    font-weight: bold;
}

td a:hover {
    text-decoration: underline;
}
</style>
</head>
<body>

<h1>Ayudante Scrabble</h1>

<div class="formulario">
    <input id="letras" maxlength="7" placeholder="LETRAS (*, ?, #)" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
    <input id="extra" maxlength="1" placeholder="+1" autocomplete="off">
    <button onclick="buscar()">Buscar</button>
</div>

<div id="estado">Cargando diccionario...</div>

<table>
<thead>
<tr>
    <th>Palabra</th>
    <th>Largo</th>
    <th>Puntaje</th>
</tr>
</thead>
<tbody id="resultados"></tbody>
</table>

<script>

let diccionario = [];

const valores = {
    A:1,E:1,O:1,S:1,I:1,U:1,N:1,R:1,T:1,
    D:2,G:2,L:2,
    C:3,M:3,B:3,P:3,
    F:4,H:4,V:4,Y:4,
    Q:5,
    J:8,Ñ:8,X:8,
    Z:10
};

function contarLetras(texto){
    const mapa = {};
    for(const letra of texto){
        mapa[letra] = (mapa[letra] || 0) + 1;
    }
    return mapa;
}

function puedeFormarse(palabra, letrasJugador, letraExtra){
    const disponibles = contarLetras(letrasJugador);
    const comodines = (disponibles['*'] || 0) + (disponibles['?'] || 0) + (disponibles['#'] || 0);

    if(letraExtra){
        disponibles[letraExtra] = (disponibles[letraExtra] || 0) + 1;
    }

    if(letraExtra && !palabra.includes(letraExtra)){
        return false;
    }

    const necesita = contarLetras(palabra);
    let comodinesNecesarios = 0;
    let letrasUsadasComodon = [];

    for(const letra in necesita){
        const faltan = necesita[letra] - (disponibles[letra] || 0);
        if(faltan > 0){
            comodinesNecesarios += faltan;
            for(let i = 0; i < faltan; i++) {
                letrasUsadasComodon.push(letra);
            }
        }
    }

    if(comodinesNecesarios > comodines){
        return false;
    }

    let puntaje = 0;
    for(const letra of palabra){
        puntaje += valores[letra] || 0;
    }
    
    for(const letra of letrasUsadasComodon) {
        puntaje -= valores[letra] || 0;
    }

    return { posible: true, puntaje: puntaje };
}

async function cargarDiccionario(){
    try {
        const respuesta = await fetch("diccionario.txt");
        const texto = await respuesta.text();

        diccionario = texto
            .split(/\r?\n/)
            .map(p => p.trim().toUpperCase())
            .filter(Boolean);

        document.getElementById("estado").textContent =
            `${diccionario.length} palabras cargadas`;
    } catch(e) {
        document.getElementById("estado").textContent = "Error al cargar el diccionario.txt";
    }
}

function buscar(){
    const letras = document.getElementById("letras").value.toUpperCase().replace(/[^A-ZÑ*?#]/g,'');
    const extra = document.getElementById("extra").value.toUpperCase().replace(/[^A-ZÑ]/g,'');

    const resultados = [];

    for(const palabra of diccionario){
        const resultadoValidacion = puedeFormarse(palabra, letras, extra);
        
        if(resultadoValidacion.posible){
            resultados.push({
                palabra,
                largo: palabra.length,
                puntaje: resultadoValidacion.puntaje
            });
        }
    }

    resultados.sort((a,b)=>
        b.largo - a.largo ||
        b.puntaje - a.puntaje ||
        a.palabra.localeCompare(b.palabra)
    );

    const tbody = document.getElementById("resultados");
    tbody.innerHTML = "";

    for(const r of resultados){
        const tr = document.createElement("tr");
        
        // Se añade el enlace dinámico a la RAE usando minúsculas para la URL estándar
        tr.innerHTML = `
            <td>
                <a href="https://dle.rae.es/${r.palabra.toLowerCase()}" target="_blank" rel="noopener noreferrer">
                    ${r.palabra}
                </a>
            </td>
            <td>${r.largo}</td>
            <td>${r.puntaje}</td>
        `;
        tbody.appendChild(tr);
    }

    document.getElementById("estado").textContent =
        `${resultados.length} palabras encontradas`;
}

cargarDiccionario();
</script>

</body>
</html>
